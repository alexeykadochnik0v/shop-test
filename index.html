<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1 class="title">Супер крутой интернет магазин!</h1>
        <h2 class="heading">Каталог</h2>
        <div class="catalog" id="catalog">
            <p class="loader">Загружаем товары . . .</p>
        </div>
        <div class="cart" id="cart">
            <h2 class="heading">Корзина</h2>
            <ul class="cart__list">
                <li>Тут будут товары добавленные в корзину</li>
            </ul>
            <div class="cart__total">Итого: <span id="cartTotal">0</span></div>
            <button class="cart__clear" id="cartClear">Очистить корзину</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
